# ABOUTME: MkDocs configuration for the NextCat website.
# ABOUTME: Serves the same markdown chapters used to build the PDF.

site_name: NextCat
site_description: Carta fundacional de l'agència de programari NextCat
site_url: https://nextcat.poblador.cat/
repo_url: https://github.com/davidpoblador/nextcat
repo_name: davidpoblador/nextcat

theme:
  name: material
  language: ca
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode fosc
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clar
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

docs_dir: book
