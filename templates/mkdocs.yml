# ABOUTME: MkDocs configuration for the Xarter website.
# ABOUTME: Serves the same markdown chapters used to build the PDF.

site_name: Xarter
site_description: Carta fundacional de l'agència de programari Xarter
site_url: https://davidpoblador.github.io/xarter/
repo_url: https://github.com/davidpoblador/xarter
repo_name: davidpoblador/xarter

theme:
  name: material
  language: ca
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mode fosc
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mode clar
  features:
    - navigation.sections
    - navigation.top
    - toc.integrate

markdown_extensions:
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

docs_dir: xarter

extra:
  version:
    provider: mike
