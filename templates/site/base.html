<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page_title }}</title>
<link rel="stylesheet" href="/style.css?v={{ css_version }}">
<script>
  // Apply the chosen theme before paint to avoid FOUC.
  (function () {
    var stored = localStorage.getItem("theme") || "system";
    document.documentElement.setAttribute("data-theme", stored);
  })();
</script>
<script data-website-id="5be495f3-0f22-4527-9b6e-9e4e6560ae75" defer src="https://meta.poblador.cat/meta.js"></script>
</head>
<body>
<header class="topbar">
  <a class="brand" href="/">{{ site_title }}</a>
  <div class="tools">
    <a class="icon-btn" href="{{ pdf_url }}" title="{{ pdf_tooltip }}" aria-label="{{ pdf_tooltip }}">
      <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><title>{{ pdf_tooltip }}</title><path d="M12 3v12" stroke-linecap="round"/><path d="M7 10l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 19h16" stroke-linecap="round"/></svg>
    </a>
    <div class="download-menu">
      <button id="download-menu-button" class="icon-btn download-menu-trigger" type="button" aria-haspopup="menu" aria-expanded="false" aria-controls="download-menu-list" title="{{ download_menu.tooltip }}" aria-label="{{ download_menu.tooltip }}">
        <svg class="icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><title>{{ download_menu.tooltip }}</title><path d="M12 3v12" stroke-linecap="round"/><path d="M7 10l5 5 5-5" stroke-linecap="round" stroke-linejoin="round"/><path d="M4 19h16" stroke-linecap="round"/><path d="M17 6l3 3" stroke-linecap="round"/></svg>
      </button>
      <ul id="download-menu-list" class="download-menu-list" role="menu" aria-labelledby="download-menu-button" hidden>
        {% for item in download_menu.entries %}
        <li role="none"><a role="menuitem" href="{{ item.href }}">{{ item.label }}</a></li>
        {% endfor %}
      </ul>
    </div>
    <a class="icon-btn" href="{{ repo_url }}" title="Veure el codi a GitHub" aria-label="Veure el codi a GitHub">
      <svg class="icon icon-solid" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><title>Veure el codi a GitHub</title><path d="M12 .5a11.5 11.5 0 0 0-3.63 22.41c.57.11.78-.25.78-.56v-2c-3.19.69-3.86-1.37-3.86-1.37-.52-1.32-1.27-1.67-1.27-1.67-1.04-.71.08-.7.08-.7 1.14.08 1.75 1.17 1.75 1.17 1.02 1.75 2.68 1.24 3.33.95.1-.74.4-1.25.72-1.54-2.55-.29-5.23-1.27-5.23-5.66 0-1.25.45-2.27 1.17-3.07-.12-.29-.51-1.45.11-3.02 0 0 .96-.31 3.15 1.17a10.94 10.94 0 0 1 5.73 0c2.18-1.48 3.14-1.17 3.14-1.17.62 1.57.23 2.73.11 3.02.73.8 1.17 1.82 1.17 3.07 0 4.4-2.69 5.37-5.25 5.65.41.35.77 1.04.77 2.1v3.11c0 .31.21.67.79.56A11.5 11.5 0 0 0 12 .5z"/></svg>
    </a>
    <button id="theme-toggle" class="icon-btn theme-toggle" type="button">
      <svg class="icon icon-sun"    viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><g stroke-linecap="round"><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><line x1="4.2" y1="4.2" x2="6.3" y2="6.3"/><line x1="17.7" y1="17.7" x2="19.8" y2="19.8"/><line x1="4.2" y1="19.8" x2="6.3" y2="17.7"/><line x1="17.7" y1="6.3" x2="19.8" y2="4.2"/></g></svg>
      <svg class="icon icon-moon"   viewBox="0 0 24 24" aria-hidden="true"><path d="M20 14.5A8 8 0 1 1 9.5 4a6.5 6.5 0 0 0 10.5 10.5z"/></svg>
      <svg class="icon icon-system" viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="4" width="18" height="12" rx="1.5"/><line x1="8" y1="20" x2="16" y2="20" stroke-linecap="round"/><line x1="12" y1="16" x2="12" y2="20"/></svg>
    </button>
  </div>
</header>
<main>
{% block body %}{% endblock %}
</main>
<footer class="pagefoot">
  <span>© 2026 <a href="https://poblador.cat">David Poblador i Garcia</a></span>
  <a href="https://creativecommons.org/licenses/by-sa/4.0/deed.ca">CC BY-SA 4.0</a>
</footer>
<script>
  (function () {
    var root = document.documentElement;
    var btn = document.getElementById("theme-toggle");
    var order = ["light", "dark", "system"];
    var labels = {
      light:  "Tema clar (clica per al fosc)",
      dark:   "Tema fosc (clica per al del sistema)",
      system: "Tema del sistema (clica per al clar)"
    };
    function refresh(theme) {
      btn.setAttribute("title", labels[theme]);
      btn.setAttribute("aria-label", labels[theme]);
    }
    function apply(theme) {
      root.setAttribute("data-theme", theme);
      localStorage.setItem("theme", theme);
      refresh(theme);
    }
    refresh(root.getAttribute("data-theme") || "system");
    btn.addEventListener("click", function () {
      var current = root.getAttribute("data-theme") || "system";
      var next = order[(order.indexOf(current) + 1) % order.length];
      apply(next);
    });
  })();
</script>
<script>
  (function () {
    var trigger = document.getElementById("download-menu-button");
    var menu = document.getElementById("download-menu-list");
    if (!trigger || !menu) return;
    function close() {
      menu.hidden = true;
      trigger.setAttribute("aria-expanded", "false");
      document.removeEventListener("click", onDocClick, true);
      document.removeEventListener("keydown", onKey);
    }
    function open() {
      menu.hidden = false;
      trigger.setAttribute("aria-expanded", "true");
      document.addEventListener("click", onDocClick, true);
      document.addEventListener("keydown", onKey);
    }
    function onDocClick(e) {
      if (!menu.contains(e.target) && e.target !== trigger && !trigger.contains(e.target)) close();
    }
    function onKey(e) {
      if (e.key === "Escape") { close(); trigger.focus(); }
    }
    trigger.addEventListener("click", function (e) {
      e.stopPropagation();
      if (menu.hidden) open(); else close();
    });
    menu.addEventListener("click", function (e) {
      if (e.target.tagName === "A") close();
    });
  })();
</script>
</body>
</html>
