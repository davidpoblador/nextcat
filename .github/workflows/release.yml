name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-pdf:
    runs-on: ubuntu-latest
    needs: release-please
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@v7

      - uses: extractions/setup-just@v4

      - name: Build PDF
        run: |
          uv sync
          just pdf

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextcat-pdf
          path: build/*.pdf

      - name: Attach PDF to release
        if: needs.release-please.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Stable alias per language for the reader edition so the site
          # header can link to /releases/latest/download/nextcat.{lang}.pdf.
          for f in build/nextcat-*.pdf; do
            base=$(basename "$f")
            case "$base" in
              *-full.pdf) ;;  # archival edition keeps its versioned name only
              *)
                lang=$(echo "$base" | sed -E 's/^nextcat-.+\.([^.]+)\.pdf$/\1/')
                cp "$f" "build/nextcat.${lang}.pdf"
                ;;
            esac
          done
          gh release upload "${{ needs.release-please.outputs.tag_name }}" build/*.pdf

  deploy-site:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    steps:
      - name: Dispatch Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --ref main
