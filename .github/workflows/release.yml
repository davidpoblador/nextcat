name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v5
        with:
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  build-artifacts:
    runs-on: ubuntu-latest
    needs: release-please
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: extractions/setup-just@v4

      - name: Build PDFs and EPUBs
        run: |
          uv sync
          just pdf
          just epub

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: nextcat-artifacts
          path: |
            build/*.pdf
            build/*.epub

      - name: Attach artifacts to release
        if: needs.release-please.outputs.release_created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Stable aliases per language so the site's download menu can link to
          # /releases/latest/download/nextcat.{lang}.{pdf,epub} for the reader
          # edition and /releases/latest/download/nextcat.{lang}-full.{pdf,epub}
          # for the archival edition with the changelog.
          shopt -s nullglob
          for f in build/nextcat-*.pdf build/nextcat-*.epub; do
            base=$(basename "$f")
            ext="${base##*.}"
            stem="${base%.*}"
            if [[ "$stem" == *-full ]]; then
              lang=$(echo "$stem" | sed -E 's/^nextcat-.+\.([^.]+)-full$/\1/')
              cp "$f" "build/nextcat.${lang}-full.${ext}"
            else
              lang=$(echo "$stem" | sed -E 's/^nextcat-.+\.([^.]+)$/\1/')
              cp "$f" "build/nextcat.${lang}.${ext}"
            fi
          done
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            build/*.pdf build/*.epub

  deploy-site:
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    permissions:
      actions: write
    steps:
      - name: Dispatch Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run pages.yml --repo ${{ github.repository }} --ref main
