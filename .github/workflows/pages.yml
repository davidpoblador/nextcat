name: Deploy site

on:
  # Run only when the Release workflow explicitly dispatches us (on a real
  # release-please release) or when a maintainer triggers a manual redeploy.
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: main

      - uses: astral-sh/setup-uv@v8.1.0

      - uses: extractions/setup-just@v4

      - name: Build site
        run: |
          uv sync
          just site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
