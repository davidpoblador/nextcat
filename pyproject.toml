[project]
name = "xarter"
version = "0.0.1"
description = "Carta fundacional de l'agència de programari Xarter"
readme = "README.md"
requires-python = ">=3.14"
license = "CC-BY-SA-4.0"
authors = [
    { name = "David Poblador i Garcia", email = "xarter@poblador.com" },
]
dependencies = [
    "babel>=2.18.0",
    "dunamai>=1.26.1",
    "typer>=0.24.1",
]

[project.scripts]
xarter = "xarter.build:app"

[dependency-groups]
docs = [
    "mkdocs-material>=9.7.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/xarter"]
